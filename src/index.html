<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RL Decal Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070714;--bg2:#0c0c1e;--bg4:#090918;
  --border:rgba(99,71,220,.18);--border2:rgba(99,71,220,.32);
  --purple:#8b5cf6;--purple2:#7c3aed;--blue:#3b82f6;--indigo:#6366f1;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --card:#0e0e22;--card-hover:rgba(139,92,246,.09);--card-sel:rgba(139,92,246,.18);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;user-select:none}
.app{display:flex;flex-direction:column;height:100vh}

/* TITLEBAR */
.titlebar{display:flex;align-items:center;height:32px;flex-shrink:0;background:#050510;border-bottom:1px solid var(--border);-webkit-app-region:drag;padding:0 14px}
.titlebar-logo{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:1.5px}
.tb-btns{display:flex;-webkit-app-region:no-drag;margin-left:auto}
.tb-btn{width:46px;height:32px;border:none;background:none;color:var(--text3);font-size:13px;cursor:pointer;transition:.15s}
.tb-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.tb-btn.close:hover{background:#ef4444;color:#fff}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;flex-shrink:0;
  background:linear-gradient(90deg,#0a0a1e,#0d0d28,#0a0a1e);
  border-bottom:1px solid var(--border2);position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple) 30%,var(--blue) 70%,transparent);opacity:.4}
.logo{display:flex;align-items:center;gap:10px;margin-right:20px}
.logo-gem{width:30px;height:30px;background:linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  box-shadow:0 0 16px rgba(124,58,237,.7);font-size:13px;display:flex;align-items:center;justify-content:center}
.logo-t1{font-size:13px;font-weight:900;letter-spacing:2px;color:#fff;line-height:1}
.logo-t2{font-size:8px;color:var(--purple);font-weight:700;letter-spacing:3px;margin-top:1px}
.nav{display:flex;gap:2px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:10px;padding:3px}
.ntab{background:none;border:none;color:var(--text3);padding:5px 16px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;transition:.18s}
.ntab.on{background:linear-gradient(135deg,var(--purple2),var(--indigo));color:#fff;box-shadow:0 0 12px rgba(124,58,237,.4)}
.ntab:hover:not(.on){color:var(--text2);background:rgba(255,255,255,.05)}
.inv-pill{display:none;background:var(--purple2);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle}
.path-status{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;transition:.15s;max-width:260px}
.path-status:hover{border-color:var(--border2)}
.path-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.path-dot.found{background:var(--green);box-shadow:0 0 6px var(--green)}
.path-dot.notfound{background:var(--red);box-shadow:0 0 6px var(--red)}
.path-dot.searching{background:var(--yellow);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.path-txt{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:156px;background:var(--bg2);border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;overflow-y:auto}
.s-sect{padding:12px 14px 5px;font-size:9px;color:var(--text3);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;
  border-left:3px solid transparent;color:var(--text3);font-size:12px;font-weight:500;
  transition:.15s;border-radius:0 8px 8px 0;margin:1px 6px 1px 0}
.s-item.on{background:rgba(139,92,246,.14);border-left-color:var(--purple);color:#fff;font-weight:700}
.s-item:hover:not(.on){color:var(--text2);background:rgba(255,255,255,.04)}
.s-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.toolbar{padding:10px 16px;background:rgba(7,7,20,.85);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
.srch{flex:1;position:relative}
.srch input{width:100%;padding:8px 12px 8px 34px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:.2s;font-family:inherit}
.srch input:focus{border-color:var(--purple);background:rgba(139,92,246,.07)}
.srch input::placeholder{color:var(--text3)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.tmeta{font-size:11px;color:var(--text3);white-space:nowrap}
.sec-hdr{padding:12px 16px 6px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sec-hdr h2{font-size:15px;font-weight:800;letter-spacing:.8px;color:#fff;text-transform:uppercase}

/* GRID */
.grid{flex:1;overflow-y:auto;padding:6px 14px 14px;display:flex;flex-direction:column;gap:8px;min-height:0}
.grid::-webkit-scrollbar{width:4px}
.grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* CARD */
.card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 14px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;flex-shrink:0}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.card.on{background:var(--card-sel);border-color:var(--purple);box-shadow:0 0 0 1px rgba(139,92,246,.25),0 6px 24px rgba(139,92,246,.18)}
.card:hover:not(.on){background:var(--card-hover);border-color:rgba(139,92,246,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card-thumb{border-radius:8px;width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;margin-bottom:0}
.card-thumb img{max-width:100%;max-height:100%;object-fit:contain}
/* colour tint overlay for alphaboost variants */
.card-thumb .tint{position:absolute;inset:0;border-radius:9px;mix-blend-mode:color;pointer-events:none}
.card-info{flex:1;min-width:0}.card-name{font-size:12px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}.card-rar-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.owned-stamp{background:var(--green);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.5px;flex-shrink:0;margin-left:auto}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:13px}
.empty-ico{font-size:40px;opacity:.25}

/* DETAIL */
.detail{width:272px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.det-hero{padding:22px 18px 16px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.det-glow{position:absolute;inset:0;pointer-events:none}
.det-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative;z-index:1;flex-shrink:0;overflow:hidden}
.det-ring img{max-width:96px;max-height:96px;object-fit:contain;position:relative;z-index:1}
.det-ring .tint{position:absolute;inset:0;border-radius:50%;mix-blend-mode:color;pointer-events:none}
.det-name{font-size:16px;font-weight:800;text-align:center;line-height:1.25;position:relative;z-index:1}
.det-sub{display:flex;align-items:center;gap:6px;margin-top:5px;position:relative;z-index:1}
.det-rar{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;border:1px solid currentColor}
.det-car{font-size:10px;color:var(--text3)}
.det-body{padding:12px 16px;flex:1;overflow-y:auto}
.det-body::-webkit-scrollbar{width:3px}
.det-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.det-desc{font-size:11.5px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.info-block{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;gap:8px}
.info-row+.info-row{border-top:1px solid rgba(255,255,255,.04);margin-top:2px}
.info-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.info-val{font-size:10px;font-weight:700;color:var(--text);font-family:monospace;text-align:right;word-break:break-all;line-height:1.4}
.rar-row{margin-bottom:10px}
.rar-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.rar-track{background:rgba(255,255,255,.05);border-radius:6px;height:5px;overflow:hidden}
.rar-fill{height:100%;border-radius:6px}
.owned-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.25);border-radius:9px;padding:9px 12px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:7px;margin-bottom:6px}
.no-path-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:9px;padding:9px 12px;font-size:11px;color:var(--yellow);margin-bottom:8px;line-height:1.5}
.no-path-box button{margin-top:7px;padding:6px 12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:6px;color:var(--yellow);font-size:11px;font-weight:700;cursor:pointer;width:100%}
.det-footer{padding:10px 16px 14px;flex-shrink:0;border-top:1px solid var(--border)}
.apply-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple2),var(--indigo),var(--blue));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:.2s;box-shadow:0 4px 18px rgba(124,58,237,.4)}
.apply-btn:hover:not(:disabled){box-shadow:0 6px 28px rgba(124,58,237,.6);transform:translateY(-1px)}
.apply-btn:disabled{background:rgba(255,255,255,.06);color:var(--text3);cursor:not-allowed;box-shadow:none;transform:none}
.apply-btn.done{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.3);color:var(--green);cursor:default;box-shadow:none;transform:none}
.restore-btn{width:100%;padding:8px;margin-top:6px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#f87171;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.restore-btn:hover{background:rgba(239,68,68,.15)}
.footer-path{margin-top:8px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:7px;font-size:9px;color:var(--text3);word-break:break-all;line-height:1.5}

/* HIGHLIGHTS — auto-scroll ticker */
.hl-bar{background:var(--bg4);border-top:1px solid var(--border);padding:8px 0 10px;flex-shrink:0;overflow:hidden;position:relative}
.hl-bar::before,.hl-bar::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none}
.hl-bar::before{left:0;background:linear-gradient(90deg,var(--bg4),transparent)}
.hl-bar::after{right:0;background:linear-gradient(-90deg,var(--bg4),transparent)}
.hl-header{display:flex;align-items:center;gap:8px;padding:0 16px 7px}
.hl-title{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hl-ticker-wrap{overflow:hidden;width:100%}
.hl-ticker{display:flex;gap:10px;animation:ticker 28s linear infinite;padding:0 16px}
.hl-ticker:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.hl-card{flex-shrink:0;width:108px;background:rgba(255,255,255,.03);border-radius:9px;padding:8px 9px;cursor:pointer;border:1px solid rgba(255,255,255,.06);transition:.15s}
.hl-card:hover{border-color:rgba(139,92,246,.4);background:var(--card-hover);transform:translateY(-1px)}
.hl-thumb{height:42px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;position:relative;overflow:hidden;border-radius:6px}
.hl-thumb img{max-width:38px;max-height:38px;object-fit:contain;position:relative;z-index:1}
.hl-thumb .tint{position:absolute;inset:0;mix-blend-mode:color;pointer-events:none}
.hl-name{font-size:9px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:2px}
.hl-rar{font-size:8px;font-weight:700}

.notif{position:fixed;top:92px;right:18px;z-index:9999;padding:11px 18px;border-radius:11px;font-size:12px;font-weight:600;color:#fff;display:none;pointer-events:none;backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* UPDATE BANNER */
.update-banner{
  display:none;align-items:center;justify-content:center;gap:6px;
  padding:7px 16px;font-size:12px;font-weight:600;color:#fff;
  border-bottom:1px solid rgba(99,71,220,.4);
  background:rgba(99,71,220,.15);flex-shrink:0;
}

.credit-bar{
  display:flex;align-items:center;justify-content:center;
  height:20px;flex-shrink:0;
  background:#030310;
  font-size:10px;font-weight:600;color:#334;
  letter-spacing:.5px;gap:6px;
  border-bottom:1px solid rgba(99,71,220,.1);
  -webkit-app-region:drag;
}
.credit-bar span{color:#4a3a6a}
.credit-bar strong{color:#6344a8;font-weight:700}
</style>
</head>
